<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>api </title>
</head>
<body>
   <h1>api fetching</h1> 
   <p id="data"></p>
</body>
</html>
<script>
   

const api = fetch("https://jsonplaceholder.typicode.com/posts");

api
  .then((res) => res.json())
  .then((data) => {
    const container = document.getElementById("data");

    data.forEach((post) => {
      container.innerHTML += <p>${post.title}</p>;
    });
  })
  .catch((error) => console.log(error));

</script
